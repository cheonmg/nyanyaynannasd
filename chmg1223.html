<style>

table{width:100%;border-collapse:collapse;font-size:13px;}

<!-- 출력 -->
<div class="card fullwidth">
<h2>전투 결과</h2>
<button id="simulate">출력</button>
<button id="clear-output" class="ghost">지우기</button>
<div id="output">출력 결과가 여기에 표시됩니다.</div>
</div>
</div>

<script>
const regTable = document.querySelector('#register-table tbody');
const charsTable = document.querySelector('#chars-table tbody');
const defsTable = document.querySelector('#defenders-table tbody');
const output = document.getElementById('output');

function rand100(){return Math.floor(Math.random()*100)+1;}
function randRange(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function rand5to18(){return Math.floor(Math.random()*14)+5;}
function rand2to8(){return Math.floor(Math.random()*7)+2;}

// 무기 데이터
const weapons = {
  "커터칼":3,
  "삽":5,
  "붓":1,
  "목공용 망치":10,
  "빗자루":6,
  "대걸레":7
};

// 전투 캐릭터 업데이트
function updateBattleChars(){
  charsTable.innerHTML='';
  const selected=[...regTable.querySelectorAll('tr')].filter(tr=>tr.querySelector('.char-select').checked);
  selected.forEach(tr=>{
    const name=tr.querySelector('.char-name').value;
    const str=tr.querySelector('.char-str').value;
    const dex=tr.querySelector('.char-dex').value;
    const intl=tr.querySelector('.char-int').value;
    const luk=tr.querySelector('.char-luk').value;
    const sp=tr.querySelector('.char-special').value;
    const newRow=document.createElement('tr');

    // 무기 선택 옵션
    const weaponOptions = Object.keys(weapons).map(w=>`<option value="${w}">${w}</option>`).join('');

    newRow.innerHTML=`
      <td>${name}</td><td>${str}</td><td>${dex}</td><td>${intl}</td><td>${luk}</td><td>${sp}</td>
      <td><select class="char-weapon"><option value="">-- 없음 --</option>${weaponOptions}</select></td>
      <td><select class="char-action">
        <option value="attack">공격</option>
        <option value="evade">회피</option>
        <option value="strength">근력 판정</option>
        <option value="agility">민첩 판정</option>
        <option value="intelligence">지능 사용</option>
        <option value="luck">행운 사용</option>
      </select></td>
      <td><select class="char-target"></select></td>`;
    charsTable.appendChild(newRow);
  });
  updateTargetOptions();
}

// 타겟 옵션 갱신
function updateTargetOptions(){
  const chars=[...charsTable.querySelectorAll('tr')];
  const defs=[...defsTable.querySelectorAll('tr')];
  const charOptions=chars.map((tr,i)=>`<option value="${i}">${tr.cells[0].textContent}</option>`).join('');
  const defOptions=defs.map((tr,i)=>`<option value="${i}">${tr.querySelector('.def-name').value}</option>`).join('');
  chars.forEach(tr=>{
    const sel=tr.querySelector('.char-target');
    const val=sel.value;
    sel.innerHTML='<option value="">-- 선택 --</option>'+defOptions;
    if(val && sel.querySelector(`option[value="${val}"]`)) sel.value=val;
  });
  defs.forEach(tr=>{
    const sel=tr.querySelector('.def-target');
    const val=sel.value;
    sel.innerHTML='<option value="">-- 선택 --</option>'+charOptions;
    if(val && sel.querySelector(`option[value="${val}"]`)) sel.value=val;
  });
}

// 체크박스 클릭 시 바로 전투 캐릭터 반영
regTable.addEventListener('change', e => {
  if(e.target.classList.contains('char-select')){
    updateBattleChars();
  }
});

// 전투 시뮬레이션
document.getElementById('simulate').onclick=()=>{
  let log='';
  const chars=[...charsTable.querySelectorAll('tr')];
  const defs=[...defsTable.querySelectorAll('tr')];

  // 1) 좀비 공격
  defs.forEach((zombie, i) => {
    const zName = zombie.querySelector('.def-name').value;
    const targetIndex = zombie.querySelector('.def-target').value;
    if (targetIndex === '') return;
    const charTr = chars[targetIndex];
    if (!charTr) return;
    const charName = charTr.cells[0].textContent;
    const dmg = randRange(10, 30);
    log += `${zName}이(가) ${charName}을(를) 공격, hp -${dmg}\n`;
  });

  // 2) 캐릭터 판정
  chars.forEach(tr=>{
    const name=tr.cells[0].textContent;
    const stats={ str:Number(tr.cells[1].textContent), dex:Number(tr.cells[2].textContent),
                  int:Number(tr.cells[3].textContent), luk:Number(tr.cells[4].textContent),
                  sp:Number(tr.cells[5].textContent)};
    const action=tr.querySelector('.char-action').value;
    const rnd=rand100();
    let calc,label;
    switch(action){
      case 'evade': calc=stats.dex*rand5to18(); label='회피'; break;
      case 'strength': calc=stats.str*rand5to18(); label='근력'; break;
      case 'agility': calc=stats.dex*rand5to18(); label='민첩'; break;
      case 'intelligence': calc=stats.int*rand5to18(); label='지능'; break;
      case 'luck': calc=stats.luk*rand5to18(); label='행운'; break;
      case 'special': calc=stats.sp*rand5to18(); label='특수'; break;
      default: return;
    }
    const result=rnd<=calc?"성공.":"실패.";
    log+=`${name}, ${label} (${calc.toFixed(1)} vs 굴림 ${rnd}) → ${result}\n`;
  });

  // 3) 캐릭터 공격
  chars.forEach(tr=>{
    const name=tr.cells[0].textContent;
    const str=Number(tr.cells[1].textContent);
    const action=tr.querySelector('.char-action').value;
    const targetIndex=tr.querySelector('.char-target').value;
    const defTr=defs[targetIndex];
    const weapon=tr.querySelector('.char-weapon').value;
    const weaponBonus=weapons[weapon]||0;

    if(action==='attack'){
      if(defTr){
        const defName=defTr.querySelector('.def-name').value;
        const defHp=defTr.querySelector('.def-hp');
        const dmg=str*rand2to8()+weaponBonus;
        defHp.value=Math.max(0,defHp.value-dmg);
        log+=`${name}이(가) ${defName}을(를) 공격, 피해 ${dmg} (${defName} hp: ${defHp.value})\n`;
      } else {
        log+=`${name}의 공격 대상이 없다.\n`;
      }
    }
  });

  output.textContent=log;
};

document.getElementById('clear-output').onclick=()=>output.textContent='';

// 초기 갱신
updateBattleChars();
</script>
